name: Docs Check

on:
  pull_request:
    paths:
      - "docs/**"
      - "**/*.md"
      - "**/AGENTS.md"

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/mlc-config.json"
