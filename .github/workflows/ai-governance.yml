name: AI Governance

on:
  pull_request:

jobs:
  check-ai-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required AI instruction files exist
        run: |
          set -e
          required_files=(
            "AGENTS.md"
            "CLAUDE.md"
            "apps/mobile/AGENTS.md"
            "apps/web-demo/AGENTS.md"
            "packages/ui/AGENTS.md"
            "packages/design-tokens/AGENTS.md"
            "packages/api/AGENTS.md"
            "packages/domain/AGENTS.md"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required AI instruction file: $f"
              missing=1
            fi
          done
          exit $missing

      - name: Warn on stale file references in AGENTS.md files
        run: |
          # Best-effort check: flag any backtick-quoted path referenced in an
          # AGENTS.md file that doesn't exist in the repo. Not exhaustive —
          # a human should still review AI file accuracy on doc-moving PRs.
          find . -name "AGENTS.md" -not -path "*/node_modules/*" | while read -r file; do
            grep -oE '`[a-zA-Z0-9_./-]+\.(md|ts|tsx|js|json)`' "$file" | tr -d '`' | while read -r ref; do
              if [[ "$ref" == /* ]]; then continue; fi
              if [ ! -e "$ref" ] && [ ! -e "$(dirname "$file")/$ref" ]; then
                echo "::warning file=$file::Referenced path may no longer exist: $ref"
              fi
            done
          done
